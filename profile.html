<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - HER Circle</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#2E1065">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='46' fill='%234B1D95'/><circle cx='50' cy='50' r='30' fill='none' stroke='%23D4AF37' stroke-width='7'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-nav="solid">
  <a class="skip-link" href="#main">Skip to main content</a>
  <div id="site-nav"></div>

  <main id="main" style="padding-top:var(--nav-h); min-height:100vh; background:var(--gray-50); padding-bottom:80px">
    <div class="container" style="max-width:860px; padding-top:32px">

      <!-- LinkedIn-style profile hero -->
      <div class="panel" style="padding:0; overflow:hidden; margin-bottom:24px">
        <!-- Cover strip -->
        <div class="profile-card-cover" style="height:160px; background:var(--grad-purple); position:relative;"></div>

        <!-- Avatar + info -->
        <div style="padding:0 28px 24px; position:relative;">
          <!-- Avatar overlapping cover -->
          <div class="avatar-upload-wrap" style="position:relative; display:inline-block; margin-top:-48px; margin-bottom:12px">
            <div class="profile-avatar-display" id="profile-avatar-display"></div>
            <label for="avatar-upload-input" class="avatar-upload-btn" aria-label="Change profile photo" title="Change profile photo">
              &#128247;
            </label>
            <input type="file" id="avatar-upload-input" accept="image/*" style="display:none" aria-label="Upload profile photo">
          </div>

          <div style="display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:12px">
            <div>
              <h1 id="profile-full-name" style="font-size:1.7rem; margin-bottom:4px"></h1>
              <div id="profile-headline-display" style="color:var(--gray-600); font-size:1rem; margin-bottom:4px"></div>
              <div id="profile-bio-display" style="color:var(--gray-600); font-size:.9rem; margin-bottom:8px; max-width:520px"></div>
              <div id="profile-connections" style="color:var(--purple); font-size:.88rem; font-weight:600"></div>
            </div>
            <button class="btn btn-outline btn-sm" id="logout-btn">Sign Out</button>
          </div>
        </div>
      </div>

      <!-- Edit Profile panel -->
      <div class="panel" id="account-panel">
        <h2>Edit Profile</h2>
        <form id="profile-form" novalidate>
          <div class="form-grid">
            <div class="field"><label for="pf-first">First Name</label><input id="pf-first" required><span class="error-msg">Required.</span></div>
            <div class="field"><label for="pf-last">Last Name</label><input id="pf-last" required><span class="error-msg">Required.</span></div>
            <div class="field"><label for="pf-email">Email</label><input id="pf-email" disabled><span class="hint">Email changes require support.</span></div>
            <div class="field"><label for="pf-phone">Phone</label><input id="pf-phone" type="tel"></div>
            <div class="field full"><label for="pf-headline">Professional Headline</label><input id="pf-headline" type="text" placeholder="e.g. Founder & CEO | Women's Business Coach"><span class="hint">Shown under your name on your profile.</span></div>
            <div class="field full"><label for="pf-bio">Bio</label><textarea id="pf-bio" rows="3" placeholder="Tell the community about yourself..." style="width:100%;padding:12px;border:1.5px solid var(--gray-200);border-radius:10px;font-family:inherit;font-size:.95rem;resize:vertical"></textarea></div>
          </div>
          <button class="btn btn-purple btn-sm" type="submit" style="margin-top:20px">Save Changes</button>
        </form>
      </div>

      <!-- Change Password panel -->
      <div class="panel">
        <h2>Change Password</h2>
        <form id="password-form" novalidate>
          <div class="form-grid">
            <div class="field"><label for="pw-current">Current Password</label><input id="pw-current" type="password" autocomplete="current-password" required><span class="error-msg">Required.</span></div>
            <div class="field"><label for="pw-new">New Password</label><input id="pw-new" type="password" autocomplete="new-password" required><span class="hint">8+ chars, uppercase, lowercase, number.</span><span class="error-msg">Doesn't meet requirements.</span></div>
          </div>
          <button class="btn btn-outline btn-sm" type="submit" style="margin-top:20px">Update Password</button>
        </form>
      </div>

      <!-- My Posts -->
      <div class="panel">
        <h2>My Posts</h2>
        <div id="my-posts-feed"></div>
      </div>

      <!-- My Registrations -->
      <div class="panel">
        <h2>My Event Registrations</h2>
        <div id="my-registrations"></div>
      </div>

    </div>
  </main>

  <div id="site-footer"></div>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/feed.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      await HCDB.ready;
      const user = HCAuth.requireRole(["user", "coordinator", "admin"]);
      if (!user) return;
      const $ = id => document.getElementById(id);

      // Render avatar
      const avatarDisplay = $("profile-avatar-display");
      function refreshAvatar(u) {
        avatarDisplay.innerHTML = HCFeed.avatarHTML(u, "lg");
      }
      refreshAvatar(user);

      // Fill in name/headline/bio
      function refreshProfileDisplay() {
        const freshUser = HCDB.get("users").find(u => u.id === user.id) || user;
        $("profile-full-name").textContent = freshUser.firstName + " " + freshUser.lastName;
        $("profile-headline-display").textContent = freshUser.headline || "HER Circle Member";
        $("profile-bio-display").textContent = freshUser.bio || "";
        const connCount = HCDB.get("connections").filter(c =>
          (c.fromId === freshUser.id || c.toId === freshUser.id) && c.status === "accepted"
        ).length;
        $("profile-connections").textContent = connCount + " connection" + (connCount !== 1 ? "s" : "");
      }
      refreshProfileDisplay();

      // Populate form
      $("pf-first").value = user.firstName;
      $("pf-last").value = user.lastName;
      $("pf-email").value = user.email;
      $("pf-phone").value = user.phone || "";
      const freshForForm = HCDB.get("users").find(u => u.id === user.id) || user;
      $("pf-headline").value = freshForForm.headline || "";
      $("pf-bio").value = freshForForm.bio || "";

      if (!user.verified) {
        const note = document.createElement("p");
        note.className = "impact-calc-result";
        note.innerHTML = "Notice: Your email isn't verified yet. Check your inbox for the verification link.";
        $("account-panel").prepend(note);
      }

      $("logout-btn").addEventListener("click", () => { HCAuth.logout(); location.href = "index.html"; });

      $("profile-form").addEventListener("submit", async e => {
        e.preventDefault();
        const res = await HCAuth.updateProfile({
          firstName: $("pf-first").value,
          lastName: $("pf-last").value,
          phone: $("pf-phone").value
        });
        // Also save headline and bio via HCDB directly
        const freshUser2 = HCDB.get("users").find(u => u.id === user.id);
        if (freshUser2) {
          HCDB.update("users", freshUser2.id, {
            headline: $("pf-headline").value.trim(),
            bio: $("pf-bio").value.trim()
          });
        }
        HC.toast(res.ok ? "Profile updated." : res.message, res.ok ? "success" : "error");
        if (res.ok) refreshProfileDisplay();
      });

      $("password-form").addEventListener("submit", async e => {
        e.preventDefault();
        const res = await HCAuth.updateProfile({
          currentPassword: $("pw-current").value,
          newPassword: $("pw-new").value
        });
        HC.toast(res.ok ? "Password updated." : res.message, res.ok ? "success" : "error");
        if (res.ok) e.target.reset();
      });

      // Avatar upload via HCFeed
      HCFeed.initProfilePage(user);
      // Also wire refreshAvatar after upload
      const avatarInput = $("avatar-upload-input");
      if (avatarInput) {
        avatarInput.addEventListener("change", e => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = ev => {
            const dataUrl = ev.target.result;
            HCDB.update("users", user.id, { avatarData: dataUrl });
            const updatedUser = Object.assign({}, user, { avatarData: dataUrl });
            refreshAvatar(updatedUser);
            HC.toast("Avatar updated!", "success");
          };
          reader.readAsDataURL(file);
        });
      }

      // My registrations
      const regs = HCDB.get("registrations").filter(r => r.email === user.email);
      const wrap = $("my-registrations");
      if (!regs.length) {
        wrap.innerHTML = `<div class="empty-state"><span class="big" aria-hidden="true"></span>No registrations yet. <a href="events.html">Find your first event &rarr;</a></div>`;
      } else {
        wrap.innerHTML = `<div class="table-wrap"><table class="data"><thead><tr>
          <th>Event</th><th>Status</th><th>Registered</th><th></th></tr></thead><tbody>` +
          regs.map(r => `<tr>
            <td><strong>${HC.esc(r.eventTitle)}</strong></td>
            <td><span class="status-pill ${r.status}">${r.status}</span></td>
            <td>${HC.fmtDate(r.createdAt, { month: "short", day: "numeric", year: "numeric" })}</td>
            <td>${r.status !== "cancelled" ? `<button class="btn btn-outline btn-sm" data-cancel="${r.id}" data-event="${r.eventId}">Cancel</button>` : ""}</td>
          </tr>`).join("") + `</tbody></table></div>`;
        wrap.addEventListener("click", e => {
          const btn = e.target.closest("[data-cancel]");
          if (!btn) return;
          HCDB.update("registrations", btn.dataset.cancel, { status: "cancelled" });
          HCDB.promoteWaitlist(btn.dataset.event);
          HC.toast("Registration cancelled.", "success");
          setTimeout(() => location.reload(), 700);
        });
      }
    });
  </script>
</body>
</html>
